<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学生中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>学生考勤中心</h3>
        <button class="btn btn-danger" onclick="localStorage.clear();location.href='index.html'">退出登录</button>
    </div>
    <div class="row gap-3">
        <div class="card p-3 col-4">
            <h5>今日签到</h5>
            <button class="btn btn-success mt-2" onclick="sign()">立即签到</button>
        </div>
        <div class="card p-3 col-4">
            <h5>请假申请</h5>
            <input type="date" id="leaveStart" class="form-control my-2">
            <input type="date" id="leaveEnd" class="form-control my-2">
            <input type="text" id="leaveReason" class="form-control my-2" placeholder="请假原因">
            <button class="btn btn-info" onclick="submitLeave()">提交申请</button>
        </div>
        <div class="card p-3 col-12">
            <h5>我的考勤记录</h5>
            <button class="btn btn-secondary mb-2" onclick="getMyAttendance()">查询记录</button>
            <div id="attendanceTable"></div>
        </div>
    </div>
    <script src="js/api.js"></script>
</body>
</html>
