<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统管理员</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>系统管理员 - 学生信息管理</h3>
        <button class="btn btn-danger" onclick="localStorage.clear();location.href='index.html'">退出登录</button>
    </div>

    <div class="card p-4 w-75 mx-auto">
        <h5 class="mb-3">新增学生账号</h5>
        <div class="mb-3">
            <label>学生学号</label>
            <input type="text" id="newSid" class="form-control" placeholder="请输入学号">
        </div>
        <div class="mb-3">
            <label>学生姓名</label>
            <input type="text" id="newName" class="form-control" placeholder="请输入姓名">
        </div>
        <div class="mb-3">
            <label>所属班级</label>
            <input type="text" id="newClass" class="form-control" placeholder="例：计科2201">
        </div>
        <button class="btn btn-success w-100" onclick="addNewStudent()">确认添加</button>
        <div id="adminMsg" class="mt-3 text-primary"></div>
    </div>

    <script src="js/api.js"></script>
</body>
</html>
