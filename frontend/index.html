<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学生考勤管理系统-登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5 w-50">
    <h2 class="text-center mb-4">学生考勤管理系统</h2>
    <div class="card p-4">
        <div class="mb-3">
            <label>登录身份</label>
            <select id="role" class="form-select">
                <option value="student">学生</option>
                <option value="teacher">教师</option>
                <option value="admin">管理员</option>
            </select>
        </div>
        <div class="mb-3">
            <label>账号</label>
            <input type="text" id="username" class="form-control" placeholder="学生输入学号">
        </div>
        <div class="mb-3">
            <label>密码</label>
            <input type="password" id="password" class="form-control" value="123456">
        </div>
        <button class="btn btn-primary w-100" onclick="login()">登录</button>
        <div id="msg" class="mt-3 text-danger"></div>
    </div>
    <script src="js/api.js"></script>
</body>
</html>
