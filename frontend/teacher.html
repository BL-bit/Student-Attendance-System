<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>教师管理中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>教师考勤管理中心</h3>
        <button class="btn btn-danger" onclick="localStorage.clear();location.href='index.html'">退出登录</button>
    </div>

    <!-- 请假审核区域 -->
    <div class="card p-4 mb-4">
        <h5>请假申请审核</h5>
        <div class="row mt-3">
            <div class="col-3">
                <input type="number" id="leaveId" class="form-control" placeholder="输入请假单ID">
            </div>
            <div class="col-3">
                <select id="auditResult" class="form-select">
                    <option value="通过">通过</option>
                    <option value="驳回">驳回</option>
                </select>
            </div>
            <div class="col-3">
                <button class="btn btn-primary w-100" onclick="auditLeave()">提交审核</button>
            </div>
        </div>
        <div id="auditMsg" class="mt-3 text-success"></div>
    </div>

    <!-- 班级考勤统计区域 -->
    <div class="card p-4">
        <h5>班级考勤统计</h5>
        <div class="row mt-3 mb-3">
            <div class="col-4">
                <input type="text" id="className" class="form-control" placeholder="输入班级名称 例：计科2201">
            </div>
            <div class="col-3">
                <button class="btn btn-info w-100" onclick="getClassAttendance()">查询统计</button>
            </div>
        </div>
        <div id="classTable"></div>
    </div>

    <script src="js/api.js"></script>
</body>
</html>
